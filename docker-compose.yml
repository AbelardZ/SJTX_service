version: '3.8'

services:
  # 改名为更通用的 sjtx_core
  sjtx_core:
    image: python:3.11-slim
    container_name: sjtx_core
    
    # 挂载当前目录到容器内的 /app
    volumes:
      - .:/app
    
    # 设置工作目录为项目根目录
    working_dir: /app
    
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1  # 确保日志实时输出
      - FLASK_APP=Web/app.py
      - ARK_API_KEY=887e6232-8ea0-4d68-89ad-6dc1826ec0c3
      - LIUYAO_LOCAL_DB_HOST=100.75.180.70
      - LIUYAO_LOCAL_DB_USER=inv_zhy
      - LIUYAO_LOCAL_DB_PASSWORD=zhy20050112
      - LIUYAO_LOCAL_DB_NAME=LiuYaoDB
      - LIUYAO_CLOUD_SQLITE_PATH=/app/data/liuyao_cloud.db
    
    # 资源限制 (服务器是 4G 内存，给 3G 比较充裕)
    deploy:
      resources:
        limits:
          memory: 3000M
          
    # 使用 host 模式直接使用宿主机网络 (Tailscale IP 可达)
    network_mode: "host"
    
    # 启动命令
    command: sh -c "pip install --no-cache-dir -r Web/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple && python Web/app.py & pip install --no-cache-dir -r news_monitor/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple && python news_monitor/main.py & wait"
             
    restart: always

  nginx:
    image: nginx:alpine
    container_name: sjtx_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    network_mode: "host"
    restart: always

<!doctype html>
<html lang="zh-CN">
<head>
    <script src="{{ url_for('static', filename='js/theme.js') }}?v=2"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行业全量研究</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global-theme.css') }}?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --bg-accent: #e8f0ff;
      --ink: #152033;
      --muted: #607087;
      --line: #d8e2ef;
      --card: rgba(255, 255, 255, 0.96);
      --brand: #2f6fed;
      --brand-soft: #edf4ff;
      --warn: #c96b58;
      --shadow: 0 14px 32px rgba(31, 44, 66, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft Yahei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      padding: 20px 24px 14px;
      flex-shrink: 0;
      z-index: 300;
      background: transparent;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .topbar.scrolled {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      margin: 0;
      font-family: "ZCOOL XiaoWei", serif;
      font-size: clamp(24px, 3.4vw, 38px);
      letter-spacing: 0.03em;
      color: var(--ink);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--ink);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .home-link:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-soft);
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      padding: 18px 24px 24px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--brand-soft);
      flex-shrink: 0;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title .dot-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
    }

    .panel-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-y: auto;
      flex: 1;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--ink);
      padding: 10px 11px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search::placeholder {
      color: var(--muted);
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
    }

    .search-wrap {
      position: relative;
    }

    .search-suggestions {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      z-index: 20;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      box-shadow: 0 16px 32px rgba(31, 44, 66, 0.12);
      overflow: hidden;
      display: none;
      max-height: 300px;
      overflow-y: auto;
    }

    .search-suggestion {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .search-suggestion:last-child {
      border-bottom: 0;
    }

    .search-suggestion:hover,
    .search-suggestion.active {
      background: var(--brand-soft);
    }

    .search-suggestion .primary {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
    }

    .search-suggestion .secondary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .tree {
      margin-top: 12px;
      flex: 1;
      min-height: 0;
      max-height: none;
      overflow: auto;
      padding-right: 2px;
    }

    .node {
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      background: var(--card);
      animation: reveal 0.3s ease;
    }

    .node-head {
      width: 100%;
      border: 0;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
    }

    .node-head .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }

    .node-head-l1 { background: var(--brand-soft); border-bottom: 2px solid var(--brand); border-radius: 10px 10px 0 0; }
    .node-head-l2 { background: var(--card); border-bottom: 1px solid var(--line); border-left: 3px solid var(--brand); }
    .node-head-l3 { background: var(--card); border-left: 3px solid var(--accent-color, #e8a820); }

    .node-head .meta {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .node-head .arrow {
      font-size: 11px;
      color: var(--muted);
      transition: transform 0.2s ease;
    }

    .node-body {
      border-top: 1px solid var(--line);
      padding: 8px;
      display: none;
    }

    .node.open > .node-head .arrow {
      transform: rotate(90deg);
    }

    .node.open > .node-body {
      display: block;
      animation: reveal 0.2s ease;
    }

    .leaf-btn {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 7px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      color: var(--ink);
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .leaf-btn:hover,
    .node-head:hover {
      background: var(--brand-soft);
    }

    .leaf-btn.active,
    .node-head.active {
      border-color: var(--brand);
      background: var(--brand-soft);
    }

    .detail-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
    }

    .detail-sub {
      color: var(--muted);
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.5;
    }

    .detail-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }



    .switch-btn {
      border: 0;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
    }

    .switch-btn.active {
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 700;
    }

    .view-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
    }

    .leaf-btn {
      margin-bottom: 7px;
    }

    .toolbar {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow-y: auto;
      background: var(--card);
      flex: 1;
      min-height: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    th {
      background: #fef9e7;
      color: var(--ink);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    [data-theme="dark"] th {
      background: #2a2410;
    }

    tr:hover td {
      background: var(--brand-soft);
    }

    .empty,
    .error {
      margin-top: 16px;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
    }

    .empty {
      background: var(--card);
      color: var(--muted);
      border: 1px dashed var(--line);
    }

    .error {
      background: var(--card);
      color: var(--warn);
      border: 1px solid var(--warn);
      line-height: 1.6;
    }

    .doc-shell {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      display: none;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      flex: 1;
    }

    .doc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--brand-soft);
    }

    .doc-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
    }

    .doc-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .doc-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      color: var(--ink);
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .doc-btn:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-soft);
    }

    .doc-content {
      padding: 14px 16px;
      overflow: auto;
      flex: 1;
      min-height: 0;
      color: var(--ink);
      line-height: 1.92;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      font-size: 17px;
      letter-spacing: 0.01em;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .doc-content h1,
    .doc-content h2,
    .doc-content h3 {
      color: var(--ink);
      margin-top: 1.4em;
      margin-bottom: 0.62em;
      line-height: 1.45;
      letter-spacing: 0.01em;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft Yahei", sans-serif;
    }

    .doc-content h1 {
      font-size: 1.7em;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.35em;
    }

    .doc-content h2 {
      font-size: 1.35em;
    }

    .doc-content h3 {
      font-size: 1.12em;
    }

    .doc-content p,
    .doc-content ul,
    .doc-content ol,
    .doc-content blockquote {
      margin-top: 0.72em;
      margin-bottom: 0.72em;
    }

    .doc-content ul,
    .doc-content ol {
      padding-left: 1.45em;
    }

    .doc-content pre {
      background: var(--bg-accent);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
    }

    .doc-content code {
      background: var(--bg-accent);
      padding: 1px 4px;
      border-radius: 4px;
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.88em;
    }

    .doc-content pre code {
      background: transparent;
      padding: 0;
    }

    .doc-content table {
      margin-top: 8px;
      border-collapse: collapse;
    }

    .doc-content th,
    .doc-content td {
      border: 1px solid var(--line);
      padding: 8px 10px;
    }

    .doc-content blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 4px solid var(--brand);
      background: var(--brand-soft);
      color: var(--ink);
      border-radius: 8px;
    }

    .doc-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: var(--bg);
      display: none;
      padding: 0;
    }

    .doc-overlay.show {
      display: block;
    }

    .doc-reader {
      width: 100%;
      height: 100vh;
      background: var(--card);
      display: flex;
      flex-direction: column;
    }

    .doc-reader-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--brand-soft);
    }

    .doc-reader-title {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
      font-weight: 700;
    }

    .doc-reader-body {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      height: calc(100vh - 62px);
      min-height: 0;
    }

    .doc-toc {
      border-right: 1px solid var(--line);
      background: var(--bg);
      padding: 14px;
      overflow: auto;
    }

    .doc-toc-title {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--ink);
      font-weight: 700;
    }

    .toc-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toc-item {
      border: 0;
      background: transparent;
      text-align: left;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 8px;
      cursor: pointer;
    }

    .toc-item:hover,
    .toc-item.active {
      color: var(--brand);
      background: var(--brand-soft);
      font-weight: 600;
    }

    .toc-item.level-2 {
      padding-left: 20px;
    }

    .toc-item.level-3 {
      padding-left: 32px;
    }

    .doc-content-full {
      padding: 18px 24px;
      overflow: auto;
    }

    /* ---- 最新研究报告卡片（位于 layout 上方） ---- */
    .reports-section {
      margin: 0 24px;
      padding: 20px 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .reports-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .reports-section-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reports-section-title .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand);
      font-size: 14px;
    }

    .reports-section-hint {
      font-size: 12px;
      color: var(--muted);
    }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .report-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      padding: 22px 24px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
      min-height: 120px;
    }

    .report-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      border-radius: 0 4px 4px 0;
      background: var(--brand);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .report-card:hover {
      border-color: var(--brand);
      box-shadow: 0 8px 24px rgba(47, 111, 237, 0.10);
      background: var(--card);
      transform: translateY(-2px);
    }

    .report-card:hover::before {
      opacity: 1;
    }

    .report-card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      padding-left: 4px;
      flex: 1;
    }

    .report-card-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
    }

    .report-card-meta .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
    }

    .report-card-arrow {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.25s ease, color 0.25s ease;
    }

    .report-card:hover .report-card-arrow {
      opacity: 1;
      color: var(--brand);
    }

    .reports-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 4px 0;
      grid-column: 1 / -1;
    }

    /* 报告全屏阅读器 */
    .report-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: var(--bg);
      display: none;
      padding: 0;
    }

    .report-overlay.show {
      display: block;
    }

    .report-reader {
      width: 100%;
      height: 100vh;
      background: var(--card);
      display: flex;
      flex-direction: column;
    }

    .report-reader-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--brand-soft);
    }

    .report-reader-title {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
      font-weight: 700;
    }

    .report-reader-body {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      height: calc(100vh - 62px);
      min-height: 0;
    }

    .report-toc {
      border-right: 1px solid var(--line);
      background: var(--bg);
      padding: 14px;
      overflow: auto;
    }

    .report-toc-title {
      margin: 0 0 10px;
      font-size: 14px;
      color: var(--ink);
      font-weight: 700;
    }

    .report-content-full {
      padding: 18px 24px;
      overflow: auto;
      color: var(--ink);
      line-height: 1.92;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    .report-content-full h1,
    .report-content-full h2,
    .report-content-full h3 {
      color: var(--ink);
      margin-top: 1.4em;
      margin-bottom: 0.62em;
      line-height: 1.45;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft Yahei", sans-serif;
    }

    .report-content-full h1 { font-size: 1.7em; border-bottom: 1px solid var(--line); padding-bottom: 0.35em; }
    .report-content-full h2 { font-size: 1.35em; }
    .report-content-full h3 { font-size: 1.12em; }
    .report-content-full p,
    .report-content-full ul,
    .report-content-full ol,
    .report-content-full blockquote { margin-top: 0.72em; margin-bottom: 0.72em; }
    .report-content-full ul,
    .report-content-full ol { padding-left: 1.45em; }
    .report-content-full pre {
      background: var(--bg-accent);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
    }
    .report-content-full code {
      background: var(--bg-accent);
      padding: 1px 4px;
      border-radius: 4px;
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.88em;
    }
    .report-content-full pre code { background: transparent; padding: 0; }
    .report-content-full table { margin-top: 8px; border-collapse: collapse; }
    .report-content-full th,
    .report-content-full td { border: 1px solid var(--line); padding: 8px 10px; }
    .report-content-full blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 4px solid var(--brand);
      background: var(--brand-soft);
      color: var(--ink);
      border-radius: 8px;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .layout {

  </style>
</head>

        </aside>
        <div class="report-content-full" id="reportFullscreenContent"></div>
      </div>
    </div>
  </div>

  <script>
    const INDUSTRY_DOC_RAW_BASE = '/industry/doc/raw/';
    const sourceCandidates = [
      "/industry/source",
      "../sw_industry_code_map.csv",
      "/sw_industry_code_map.csv",
      "./sw_industry_code_map.csv"
    ];

    const appState = {
      treeData: [],
      companyIndex: [],
      selected: null,
      industryKeyword: "",
      companyKeyword: "",
      expandedL1: new Set(),
      expandedL2: new Set(),
      stockDataMap: {},
      stockDataDate: "",
      sortField: "",
      sortDir: "desc"
    };

    const treeEl = document.getElementById("tree");
    const industrySearchEl = document.getElementById("industrySearch");
    const searchSuggestionsEl = document.getElementById("searchSuggestions");
    const companySearchEl = document.getElementById("companySearch");
    const detailTitleEl = document.getElementById("detailTitle");
    const detailMetaEl = document.getElementById("detailMeta");
    const detailActionsEl = document.getElementById("detailActions");
    const toolbarEl = document.getElementById("toolbar");
    const viewSwitchEl = document.getElementById("viewSwitch");
    const companyViewBtn = document.getElementById("companyViewBtn");
    const docViewBtn = document.getElementById("docViewBtn");
    const tableWrapEl = document.getElementById("tableWrap");
    const companyRowsEl = document.getElementById("companyRows");
    const emptyStateEl = document.getElementById("emptyState");
    const errorStateEl = document.getElementById("errorState");
    const docShellEl = document.getElementById("docShell");
    const docTitleEl = document.getElementById("docTitle");
    const docContentEl = document.getElementById("docContent");
    const docFullscreenBtn = document.getElementById("docFullscreenBtn");
    const docOverlayEl = document.getElementById("docOverlay");
    const docFullscreenTitleEl = document.getElementById("docFullscreenTitle");
    const docFullscreenContentEl = document.getElementById("docFullscreenContent");
    const docTocListEl = document.getElementById("docTocList");
    const docCloseFullscreenBtn = document.getElementById("docCloseFullscreenBtn");

    // 研究报告相关 DOM
    const reportsGridEl = document.getElementById("reportsGrid");
    const reportOverlayEl = document.getElementById("reportOverlay");
    const reportFullscreenTitleEl = document.getElementById("reportFullscreenTitle");
    const reportFullscreenContentEl = document.getElementById("reportFullscreenContent");
    const reportTocListEl = document.getElementById("reportTocList");
    const reportCloseFullscreenBtn = document.getElementById("reportCloseFullscreenBtn");

    const docCache = new Map();
    const reportCache = new Map();
    let currentDocHtml = "";

    appState.activeView = "company";

    function uniqCompanies(companies) {
      const map = new Map();
      companies.forEach((item) => {
        const key = `${item.code}__${item.name}`;
        if (!map.has(key)) {
          map.set(key, item);
        }
      });
      return Array.from(map.values());
    }

    function parseCsvLine(line) {
      const values = [];
      let current = "";
      let inQuotes = false;

      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        const nextChar = line[index + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === ',' && !inQuotes) {
          values.push(current);
          current = "";
          continue;
        }

        current += char;
      }

      values.push(current);
      return values.map((value) => value.trim());
    }

    function parseCsv(csvText) {
      appState.companyIndex = [];
      const lines = csvText.split(/\r?\n/).filter((line) => line.trim());
      if (lines.length === 0) {
        return [];
      }

      const headers = parseCsvLine(lines[0]);
      const indexes = {
        exchange: headers.indexOf("交易所"),
        industryCode: headers.indexOf("行业代码"),
        stockCode: headers.indexOf("股票代码"),
        companyName: headers.indexOf("公司简称"),
        level1: headers.indexOf("新版一级行业"),
        level2: headers.indexOf("新版二级行业"),
        level3: headers.indexOf("新版三级行业")
      };

      const roots = [];
      const level1Map = new Map();

      function getOrCreateLevel1(name) {
        if (!level1Map.has(name)) {
          const node = {
            name,
            level2: [],
            companies: [],
            _level2Map: new Map()
          };
          level1Map.set(name, node);
          roots.push(node);
        }
        return level1Map.get(name);
      }

      function getOrCreateLevel2(level1Node, name) {
        if (!level1Node._level2Map.has(name)) {
          const node = {
            name,
            level3: [],
            companies: [],
            _level3Map: new Map()
          };
          level1Node._level2Map.set(name, node);
          level1Node.level2.push(node);
        }
        return level1Node._level2Map.get(name);
      }

      function getOrCreateLevel3(level2Node, name) {
        if (!level2Node._level3Map.has(name)) {
          const node = {
            name,
            companies: []
          };
          level2Node._level3Map.set(name, node);
          level2Node.level3.push(node);
        }
        return level2Node._level3Map.get(name);
      }

      lines.slice(1).forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) {
          return;
        }

        const cols = parseCsvLine(trimmed);
        const level1Name = (cols[indexes.level1] || "").trim();
        const level2Name = (cols[indexes.level2] || "").trim();
        const level3Name = (cols[indexes.level3] || "").trim();
        const stockCode = (cols[indexes.stockCode] || "").trim();
        const companyName = (cols[indexes.companyName] || "").trim();

        if (!level1Name || !level2Name || !level3Name || !stockCode || !companyName) {
          return;
        }

        const company = {
          code: stockCode,
          name: companyName,
          exchange: indexes.exchange >= 0 ? (cols[indexes.exchange] || "").trim() : "",
          industryCode: indexes.industryCode >= 0 ? (cols[indexes.industryCode] || "").trim() : "",
          level1: level1Name,
          level2: level2Name,
          level3: level3Name
        };

        appState.companyIndex.push(company);

        const level1Node = getOrCreateLevel1(level1Name);
        const level2Node = getOrCreateLevel2(level1Node, level2Name);
        const level3Node = getOrCreateLevel3(level2Node, level3Name);

        if (!level3Node.companies.some((item) => item.code === company.code)) {
          level3Node.companies.push(company);
        }
        if (!level2Node.companies.some((item) => item.code === company.code)) {
          level2Node.companies.push(company);
        }
        if (!level1Node.companies.some((item) => item.code === company.code)) {
          level1Node.companies.push(company);
        }
      });

      roots.forEach((level1Node) => {
        delete level1Node._level2Map;
        level1Node.companies = uniqCompanies(level1Node.companies);
        level1Node.level2.forEach((level2Node) => {
          delete level2Node._level3Map;
          level2Node.companies = uniqCompanies(level2Node.companies);
          level2Node.level3.forEach((level3Node) => {
            level3Node.companies = uniqCompanies(level3Node.companies);
          });
        });
      });

      return roots;
    }

    function matchIndustry(node, keyword) {
      if (!keyword) {
        return true;
      }
      const key = keyword.toLowerCase();
      if (node.name.toLowerCase().includes(key)) {
        return true;
      }

      if (node.companies && node.companies.some(c => c.name.toLowerCase().includes(key) || c.code.toLowerCase().includes(key))) {
        return true;
      }

      if (node.level2) {
        return node.level2.some((l2) => {
          if (l2.name.toLowerCase().includes(key)) {
            return true;
          }
          if (l2.companies && l2.companies.some(c => c.name.toLowerCase().includes(key) || c.code.toLowerCase().includes(key))) {
            return true;
          }
          return l2.level3.some((l3) => {
             if (l3.name.toLowerCase().includes(key)) return true;
             if (l3.companies && l3.companies.some(c => c.name.toLowerCase().includes(key) || c.code.toLowerCase().includes(key))) return true;
             return false;
          });
        });
      }

      return false;
    }

    function normalizeKeyword(keyword) {
      return (keyword || "").trim().toLowerCase();
    }

    function scoreCompany(company, keyword) {
      if (!keyword) {
        return 0;
      }

      const code = (company.code || "").toLowerCase();
      const name = (company.name || "").toLowerCase();
      const leaf = (company.level3 || "").toLowerCase();
      const branch = `${company.level1 || ""} / ${company.level2 || ""} / ${company.level3 || ""}`.toLowerCase();

      if (code === keyword || name === keyword) {
        return 400;
      }
      if (code.startsWith(keyword) || name.startsWith(keyword)) {
        return 300;
      }
      if (code.includes(keyword)) {
        return 220;
      }
      if (name.includes(keyword)) {
        return 200;
      }
      if (leaf.includes(keyword)) {
        return 140;
      }
      if (branch.includes(keyword)) {
        return 100;
      }
      return 0;
    }

    function getCompanySuggestions(keyword) {
      const normalized = normalizeKeyword(keyword);
      if (!normalized) {
        return [];
      }

      return appState.companyIndex
        .map((company) => ({
          company,
          score: scoreCompany(company, normalized)
        }))
        .filter((item) => item.score > 0)
        .sort((left, right) => {
          if (right.score !== left.score) {
            return right.score - left.score;
          }
          return (left.company.code || "").localeCompare(right.company.code || "", "zh-Hans-CN");
        })
        .slice(0, 8)
        .map((item) => item.company);
    }

    function findIndustryNodeByPath(level1Name, level2Name, level3Name) {
      const level1Node = appState.treeData.find((node) => node.name === level1Name);
      if (!level1Node) {
        return null;
      }

      const level2Node = level1Node.level2.find((node) => node.name === level2Name);
      if (!level2Node) {
        return null;
      }

      const level3Node = level2Node.level3.find((node) => node.name === level3Name);
      if (!level3Node) {
        return null;
      }

      return { level1Node, level2Node, level3Node };
    }

    function renderSearchSuggestions() {
      const suggestions = getCompanySuggestions(industrySearchEl.value || "");
      searchSuggestionsEl.innerHTML = "";

      if (!suggestions.length) {
        searchSuggestionsEl.style.display = "none";
        return;
      }

      suggestions.forEach((company) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "search-suggestion";
        button.innerHTML = `
          <span class="primary">${company.code} ${company.name}</span>
          <span class="secondary">三级行业：${company.level1} / ${company.level2} / ${company.level3}</span>
        `;
        button.addEventListener("click", () => jumpToCompany(company));
        searchSuggestionsEl.appendChild(button);
      });

      searchSuggestionsEl.style.display = "block";
    }

    function revealSelection(selection) {
      requestAnimationFrame(() => {
        const target = treeEl.querySelector(`[data-selection="${selectionKey(selection)}"]`);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      });
    }

    function jumpToCompany(company) {
      const target = findIndustryNodeByPath(company.level1, company.level2, company.level3);
      if (!target) {
        return;
      }

      const selection = {
        type: "l3",
        path: `${company.level1}/${company.level2}/${company.level3}`,
        name: `${company.level1} / ${company.level2} / ${company.level3}`,
        companies: target.level3Node.companies
      };

      appState.expandedL1.add(`l1:${company.level1}`);
      appState.expandedL2.add(`l2:${company.level1}/${company.level2}`);
      searchSuggestionsEl.style.display = "none";
      setSelected(selection);
      companySearchEl.value = company.code;
      appState.companyKeyword = company.code;
      renderDetail();
      revealSelection(selection);
    }

    function setSelected(selection) {
      appState.selected = selection;
      appState.companyKeyword = "";
      companySearchEl.value = "";
      searchSuggestionsEl.style.display = "none";
      renderTree();
      renderDetail();
    }

    function selectionKey(obj) {
      return `${obj.type}:${obj.path}`;
    }

    function buildDocPath(level1, level2, level3) {
      return [level1, level2, `${level3}.md`].map((segment) => encodeURIComponent(segment)).join('/');
    }

    function buildDocRawUrl(level1, level2, level3) {
      return `${INDUSTRY_DOC_RAW_BASE}${buildDocPath(level1, level2, level3)}`;
    }

    function setActiveView(mode) {
      appState.activeView = mode;
      companyViewBtn.classList.toggle("active", mode === "company");
      docViewBtn.classList.toggle("active", mode === "doc");
      tableWrapEl.style.display = mode === "company" ? "block" : "none";
      companySearchEl.style.display = mode === "company" ? "block" : "none";
      docShellEl.style.display = mode === "doc" ? "flex" : "none";
    }

    function buildToc(container) {
      const headings = Array.from(container.querySelectorAll("h1, h2, h3"));
      const items = [];
      headings.forEach((el, idx) => {
        const text = (el.textContent || "").trim();
        if (!text) {
          return;
        }
        el.id = `doc-fs-anchor-${idx}`;
        items.push({
          id: el.id,
          title: text,
          level: Number(el.tagName.slice(1)) || 1
        });
      });
      return items;
    }

    function renderFullscreenToc() {
      const tocItems = buildToc(docFullscreenContentEl);
      docTocListEl.innerHTML = "";
      if (!tocItems.length) {
        docTocListEl.innerHTML = '<div class="hint" style="margin-top:0;">当前文档暂无可索引标题。</div>';
        return;
      }

      tocItems.forEach((item, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `toc-item level-${Math.min(item.level, 3)}`;
        btn.textContent = item.title;
        btn.addEventListener("click", () => {
          const target = docFullscreenContentEl.querySelector(`#${item.id}`);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
          Array.from(docTocListEl.children).forEach((el) => el.classList.remove("active"));
          btn.classList.add("active");
        });
        if (index === 0) {
          btn.classList.add("active");
        }
        docTocListEl.appendChild(btn);
      });
    }

    async function loadDocPreview(path) {
      if (!path) {
        docShellEl.style.display = "none";
        return;
      }

      if (docCache.has(path)) {
        const cached = docCache.get(path);
        docTitleEl.textContent = cached.title;
        docContentEl.innerHTML = cached.html;
        if (appState.activeView === "doc") {
          docShellEl.style.display = "flex";
        }
        currentDocHtml = cached.html;
        docFullscreenTitleEl.textContent = cached.title;
        docFullscreenContentEl.innerHTML = cached.html;
        renderFullscreenToc();
        return;
      }

      docTitleEl.textContent = "行业研究文档";
      docContentEl.innerHTML = "<div class=\"hint\">正在加载文档...</div>";
      docShellEl.style.display = "flex";

      try {
        const parts = path.split("/");
        const url = buildDocRawUrl(parts[0], parts[1], parts[2]);
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("文档读取失败");
        }
        const text = await res.text();
        const html = marked.parse(text || "");
        const title = parts[2] || "行业研究文档";
        docCache.set(path, { html, title });
        docTitleEl.textContent = title;
        docContentEl.innerHTML = html;
        currentDocHtml = html;
        docFullscreenTitleEl.textContent = title;
        docFullscreenContentEl.innerHTML = html;
        renderFullscreenToc();
      } catch (err) {
        docContentEl.innerHTML = "<div class=\"error\" style=\"display:block;margin-top:0;\">当前行业暂无可预览文档。</div>";
        currentDocHtml = "";
        docFullscreenContentEl.innerHTML = "";
        docTocListEl.innerHTML = '<div class="hint" style="margin-top:0;">暂无目录索引。</div>';
      }
    }

    function renderTree() {
      treeEl.innerHTML = "";
      const keyword = appState.industryKeyword.trim();
      const visible = appState.treeData.filter((l1) => matchIndustry(l1, keyword));

      if (visible.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "没有匹配到行业或相关股票，请修改关键词。";
        treeEl.appendChild(empty);
        return;
      }

      visible.forEach((l1) => {
        const l1Node = document.createElement("div");
        const l1Key = `l1:${l1.name}`;
        l1Node.className = appState.expandedL1.has(l1Key) ? "node open" : "node";

        const l1Head = document.createElement("button");
        l1Head.type = "button";
        l1Head.className = "node-head node-head-l1";
        const l1Sel = { type: "l1", path: l1.name, name: l1.name, companies: l1.companies };
        l1Head.dataset.selection = selectionKey(l1Sel);
        if (appState.selected && selectionKey(appState.selected) === selectionKey(l1Sel)) {
          l1Head.classList.add("active");
        }

        l1Head.innerHTML = `<span class="name">${l1.name}</span><span class="meta">${l1.level2.length} 个二级 / ${l1.companies.length} 家公司</span><span class="arrow">▶</span>`;
        l1Head.addEventListener("click", () => {
          if (appState.expandedL1.has(l1Key)) {
            appState.expandedL1.delete(l1Key);
          } else {
            appState.expandedL1.add(l1Key);
          }
          setSelected(l1Sel);
        });

        const l1Body = document.createElement("div");
        l1Body.className = "node-body";

        l1.level2.forEach((l2) => {
          const l2Node = document.createElement("div");
          const l2Key = `l2:${l1.name}/${l2.name}`;
          l2Node.className = appState.expandedL2.has(l2Key) ? "node open" : "node";

          const l2Head = document.createElement("button");
          l2Head.type = "button";
          l2Head.className = "node-head node-head-l2";
          const l2Sel = {
            type: "l2",
            path: `${l1.name}/${l2.name}`,
            name: `${l1.name} / ${l2.name}`,
            companies: l2.companies
          };
          l2Head.dataset.selection = selectionKey(l2Sel);
          if (appState.selected && selectionKey(appState.selected) === selectionKey(l2Sel)) {
            l2Head.classList.add("active");
          }

          l2Head.innerHTML = `<span class="name">${l2.name}</span><span class="meta">${l2.level3.length} 个三级 / ${l2.companies.length} 家</span><span class="arrow">▶</span>`;
          l2Head.addEventListener("click", () => {
            if (appState.expandedL2.has(l2Key)) {
              appState.expandedL2.delete(l2Key);
            } else {
              appState.expandedL2.add(l2Key);
            }
            setSelected(l2Sel);
          });

          const l2Body = document.createElement("div");
          l2Body.className = "node-body";

          l2.level3.forEach((l3) => {
            const l3Btn = document.createElement("button");
            l3Btn.type = "button";
            l3Btn.className = "leaf-btn node-head-l3";
            const l3Sel = {
              type: "l3",
              path: `${l1.name}/${l2.name}/${l3.name}`,
              name: `${l1.name} / ${l2.name} / ${l3.name}`,
              companies: l3.companies
            };
            l3Btn.dataset.selection = selectionKey(l3Sel);
            if (appState.selected && selectionKey(appState.selected) === selectionKey(l3Sel)) {
              l3Btn.classList.add("active");
            }

            l3Btn.innerHTML = `<span>${l3.name}</span><span class="meta">${l3.companies.length} 家</span>`;
            l3Btn.addEventListener("click", () => setSelected(l3Sel));
            l2Body.appendChild(l3Btn);
          });

          l2Node.appendChild(l2Head);
          l2Node.appendChild(l2Body);
          l1Body.appendChild(l2Node);
        });

        l1Node.appendChild(l1Head);
        l1Node.appendChild(l1Body);
        treeEl.appendChild(l1Node);
      });
    }

    function renderDetail() {
      if (!appState.selected) {
        detailTitleEl.textContent = "请选择左侧行业节点";
        detailMetaEl.textContent = "支持查看一级、二级、三级对应公司集合。";
        detailActionsEl.style.display = "none";
        detailActionsEl.innerHTML = "";
        toolbarEl.style.display = "none";
        tableWrapEl.style.display = "none";
        viewSwitchEl.style.display = "none";
        docShellEl.style.display = "none";
        emptyStateEl.style.display = "block";
        return;
      }

      const fullList = appState.selected.companies || [];
      const keyword = appState.companyKeyword.trim().toLowerCase();
      let list = keyword
        ? fullList.filter((item) =>
            item.code.toLowerCase().includes(keyword) || item.name.toLowerCase().includes(keyword)
          )
        : fullList;

      // Apply sorting
      if (appState.sortField) {
        const field = appState.sortField;
        const dir = appState.sortDir === 'asc' ? 1 : -1;
        list = [...list].sort((a, b) => {
          const sdA = appState.stockDataMap[a.code] || {};
          const sdB = appState.stockDataMap[b.code] || {};
          const va = parseFloat(sdA[field]) || 0;
          const vb = parseFloat(sdB[field]) || 0;
          return (va - vb) * dir;
        });
      }

      detailTitleEl.textContent = appState.selected.name;
      detailMetaEl.textContent = `共 ${fullList.length} 家公司，当前显示 ${list.length} 家。`;
      detailActionsEl.style.display = "flex";
      detailActionsEl.innerHTML = "";
      if (appState.selected.type === "l3") {
        detailActionsEl.innerHTML = `<div class="hint">已切换为当前三级行业的研究文档同页预览。</div>`;
        if (appState.activeView === "doc") {
          loadDocPreview(appState.selected.path);
        }
      } else {
        detailActionsEl.innerHTML = `<div class="hint">选择三级行业后，可在下方直接查看对应研究文档。</div>`;
        if (appState.activeView === "doc") {
          docTitleEl.textContent = "行业研究文档";
          docContentEl.innerHTML = "<div class=\"empty\" style=\"margin-top:0;\">请先选择三级行业后再查看文档。</div>";
          docShellEl.style.display = "flex";
        }
      }
      toolbarEl.style.display = "grid";
      viewSwitchEl.style.display = "inline-flex";
      setActiveView(appState.activeView);
      emptyStateEl.style.display = "none";

      companyRowsEl.innerHTML = "";
      const stockdataDateEl = document.getElementById("stockdataDate");
      if (appState.stockDataDate) {
        stockdataDateEl.style.display = "block";
        stockdataDateEl.textContent = `数据更新日期：${appState.stockDataDate}`;
      } else {
        stockdataDateEl.style.display = "none";
      }

      if (list.length === 0) {
        const row = document.createElement("tr");
        row.innerHTML = "<td colspan=\"9\" style=\"color:var(--muted);\">无匹配公司</td>";
        companyRowsEl.appendChild(row);
        return;
      }

      list.forEach((company) => {
        const sd = appState.stockDataMap[company.code] || {};
        const retFields = ['ret_1d', 'ret_5d', 'ret_10d', 'ret_20d', 'ret_60d'];
        const retCells = retFields.map(field => {
          const val = sd[field];
          if (!val || val === '-') return '<td>-</td>';
          const num = parseFloat(val);
          if (isNaN(num)) return `<td>${val}</td>`;
          const color = num > 0 ? '#d44' : num < 0 ? '#3a8' : '';
          return `<td style="color:${color}">${val}</td>`;
        }).join('');
        const row = document.createElement("tr");
        row.innerHTML = `<td>${company.code}</td><td>${company.name}</td><td>${company.level3}</td><td>${sd.market_cap || '-'}</td>${retCells}`;
        companyRowsEl.appendChild(row);
      });

      updateSortArrows();
    }

    function toggleSort(field) {
      if (appState.sortField === field) {
        appState.sortDir = appState.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        appState.sortField = field;
        appState.sortDir = 'desc';
      }
      renderDetail();
    }

    function updateSortArrows() {
      const sortableFields = ['market_cap', 'ret_1d', 'ret_5d', 'ret_10d', 'ret_20d', 'ret_60d'];
      sortableFields.forEach(field => {
        const th = document.getElementById('sort-' + field);
        if (!th) return;
        const arrow = th.querySelector('.sort-arrow');
        if (!arrow) return;
        if (appState.sortField === field) {
          arrow.textContent = appState.sortDir === 'asc' ? ' ▲' : ' ▼';
        } else {
          arrow.textContent = '';
        }
      });
    }

    async function loadCsv() {
      for (const url of sourceCandidates) {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (res.ok) {
            return await res.text();
          }
        } catch (err) {
          // Try next path candidate.
        }
      }
      throw new Error("未找到可读取的数据源文件 sw_industry_code_map.csv");
    }

    function showError(errMessage) {
      errorStateEl.style.display = "block";
      errorStateEl.textContent = `${errMessage}。如果你是直接双击打开 HTML，请先在项目根目录启动本地静态服务后访问 /industry/homepage。`;
    }

    industrySearchEl.addEventListener("input", (e) => {
      appState.industryKeyword = e.target.value || "";
      renderSearchSuggestions();
      renderTree();
    });

    industrySearchEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") {
        return;
      }

      const suggestions = getCompanySuggestions(industrySearchEl.value || "");
      if (suggestions.length > 0) {
        event.preventDefault();
        jumpToCompany(suggestions[0]);
      }
    });

    companySearchEl.addEventListener("input", (e) => {
      appState.companyKeyword = e.target.value || "";
      renderDetail();
    });

    companyViewBtn.addEventListener("click", () => setActiveView("company"));
    docViewBtn.addEventListener("click", () => {
      setActiveView("doc");
      if (appState.selected && appState.selected.type === "l3") {
        loadDocPreview(appState.selected.path);
      } else {
        docTitleEl.textContent = "行业研究文档";
        docContentEl.innerHTML = "<div class=\"empty\" style=\"margin-top:0;\">请先选择三级行业后再查看文档。</div>";
      }
    });

    docFullscreenBtn.addEventListener("click", () => {
      if (!currentDocHtml) {
        return;
      }
      docOverlayEl.classList.add("show");
      document.body.style.overflow = "hidden";
    });

    docCloseFullscreenBtn.addEventListener("click", () => {
      docOverlayEl.classList.remove("show");
      document.body.style.overflow = "";
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && docOverlayEl.classList.contains("show")) {
        docOverlayEl.classList.remove("show");
        document.body.style.overflow = "";
      }
    });

    async function loadStockData() {
      try {
        const res = await fetch('/industry/stockdata/latest', { cache: "no-store" });
        if (!res.ok) return;
        const json = await res.json();
        if (json.data && Object.keys(json.data).length > 0) {
          appState.stockDataMap = json.data;
          appState.stockDataDate = json.date || '';
        }
      } catch (err) {
        // Silently ignore — stock data is optional
      }
    }

    // ========== 研究报告相关 ==========

    async function loadReports() {
      try {
        const res = await fetch('/industry/reports', { cache: "no-store" });
        if (!res.ok) throw new Error('加载报告列表失败');
        const json = await res.json();
        renderReports(json.reports || []);
      } catch (err) {
        reportsGridEl.innerHTML = '<div class="reports-empty">加载研究报告失败</div>';
      }
    }

    function renderReports(reports) {
      if (!reports.length) {
        reportsGridEl.innerHTML = '<div class="reports-empty">暂无研究报告</div>';
        return;
      }

      reportsGridEl.innerHTML = '';
      reports.forEach((report) => {
        const card = document.createElement('div');
        card.className = 'report-card';
        card.title = `点击查看：${report.name}`;
        card.innerHTML = `
          <div class="report-card-name">${report.name}</div>
          <div class="report-card-meta">
            <span>${report.mtime_iso}</span>
            <span class="dot"></span>
            <span>${formatWordCount(report.word_count)}</span>
          </div>
          <span class="report-card-arrow">→</span>
        `;
        card.addEventListener('click', () => openReport(report));
        reportsGridEl.appendChild(card);
      });
    }

    function formatWordCount(count) {
      if (!count || count === 0) return '0 字';
      if (count >= 10000) return (count / 10000).toFixed(1) + ' 万字';
      return count.toLocaleString() + ' 字';
    }

    function buildReportToc(container) {
      const headings = Array.from(container.querySelectorAll("h1, h2, h3"));
      const items = [];
      headings.forEach((el, idx) => {
        const text = (el.textContent || "").trim();
        if (!text) return;
        el.id = `report-fs-anchor-${idx}`;
        items.push({
          id: el.id,
          title: text,
          level: Number(el.tagName.slice(1)) || 1
        });
      });
      return items;
    }

    function renderReportToc() {
      const tocItems = buildReportToc(reportFullscreenContentEl);
      reportTocListEl.innerHTML = "";
      if (!tocItems.length) {
        reportTocListEl.innerHTML = '<div class="hint" style="margin-top:0;">当前文档暂无可索引标题。</div>';
        return;
      }

      tocItems.forEach((item, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `toc-item level-${Math.min(item.level, 3)}`;
        btn.textContent = item.title;
        btn.addEventListener("click", () => {
          const target = reportFullscreenContentEl.querySelector(`#${item.id}`);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
          Array.from(reportTocListEl.children).forEach((el) => el.classList.remove("active"));
          btn.classList.add("active");
        });
        if (index === 0) btn.classList.add("active");
        reportTocListEl.appendChild(btn);
      });
    }

    async function openReport(report) {
      reportFullscreenTitleEl.textContent = report.name;
      reportFullscreenContentEl.innerHTML = '<div class="hint">正在加载报告...</div>';
      reportOverlayEl.classList.add("show");
      document.body.style.overflow = "hidden";

      // 检查缓存
      if (reportCache.has(report.filename)) {
        const cached = reportCache.get(report.filename);
        reportFullscreenContentEl.innerHTML = cached;
        renderReportToc();
        return;
      }

      try {
        const res = await fetch(`/industry/reports/raw/${encodeURIComponent(report.filename)}`, { cache: "no-store" });
        if (!res.ok) throw new Error('报告读取失败');
        const text = await res.text();
        const html = marked.parse(text || "");
        reportCache.set(report.filename, html);
        reportFullscreenContentEl.innerHTML = html;
        renderReportToc();
      } catch (err) {
        reportFullscreenContentEl.innerHTML = '<div class="error" style="display:block;margin-top:0;">报告加载失败，请稍后重试。</div>';
        reportTocListEl.innerHTML = '<div class="hint" style="margin-top:0;">暂无目录索引。</div>';
      }
    }

    reportCloseFullscreenBtn.addEventListener("click", () => {
      reportOverlayEl.classList.remove("show");
      document.body.style.overflow = "";
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && reportOverlayEl.classList.contains("show")) {
        reportOverlayEl.classList.remove("show");
        document.body.style.overflow = "";
      }
    });

    // ========== 初始化 ==========

    (async function bootstrap() {
      try {
        const csvText = await loadCsv();
        const data = parseCsv(csvText);
        if (!data.length) {
          throw new Error("数据解析结果为空");
        }

        appState.treeData = data;
        await Promise.all([loadStockData(), loadReports()]);
        renderTree();
        renderDetail();
      } catch (err) {
        showError(err.message || "页面初始化失败");
      }
    })();

    // 修复表格标题行背景为不透明（覆盖 global-theme.css 的半透明变量）
    (function fixTableHeader() {
      const style = document.createElement('style');
      style.textContent = 'th{background:#edf4ff!important}[data-theme="dark"] th{background:#1e293b!important}';
      document.head.appendChild(style);
    })();
  </script>
</body>
</html>

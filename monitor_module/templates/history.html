<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="{{ url_for('static', filename='js/theme.js') }}?v=2"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global-theme.css') }}?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史消息流 - 神机天象</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
    <style>
        :root {
            /* 升级配色方案：深邃蓝 + 活力红 + 柔和灰背景 */
            --primary-color: #1B365D; /* Oxford Blue */
            --accent-color: #E63946;  /* Imperial Red */
            --bg-color: #F1F5F9;      /* Slate 100 */
            --bg-card: #ffffff;
            --text-main: #1e293b;     /* Slate 800 */
            --text-secondary: #64748b;/* Slate 500 */
            --border-color: #e2e8f0;  /* Slate 200 */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius-md: 8px;
            --radius-lg: 16px;
            --bg-input: #ffffff;
            --font-serif: 'Georgia', 'Songti SC', 'STSong', serif;
        }

        [data-theme="dark"] {
            --primary-color: #60a5fa;
            --accent-color: #f87171;
            --bg-color: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --bg-input: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            background-color: var(--bg-card);
            padding: 3.5rem 4rem;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            top: -20%;
            right: -5%;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--primary-color), transparent);
            opacity: 0.05;
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .header h1::before {
             content: '';
             display: block;
             width: 4px; /* 变细 */
             height: 100%; /* 拉长 */
             min-height: 48px;
             background: var(--accent-color);
             border-radius: 2px;
             box-shadow: 0 0 10px rgba(230, 57, 70, 0.4); /* 发光效果 */
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-left: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--bg-input);
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-link:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: var(--bg-color);
        }
        
        .controls-section {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .controls-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 14px;
            align-items: end;
        }

        .range-note {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .date-input {
            padding: 0.6rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background: var(--bg-input);
            color: var(--text-main);
        }

        .date-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(44, 62, 80, 0.1);
        }

        .load-btn {
            padding: 0.6rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .load-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .load-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .filters-section {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        
        .filters-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
        }
        
        .filter-row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .filter-category-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            margin-right: 8px;
            min-width: 80px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--bg-input);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .filter-category-label:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-category-label.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .filter-btn {
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .feed-container {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            min-height: 400px;
        }

        .feed-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .stats-info {
            background: var(--bg-input);
            border-radius: var(--radius-md);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .empty-state::before {
            content: '📭';
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .history-item {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* 标签风格 */
        .item-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            /* 默认 */
            background: var(--bg-color); 
            color: var(--text-secondary); 
            border: 1px solid var(--border-color);
        }

        /* 蓝色系 */
        .item-label.公司公告, .item-label.行业消息, .item-label.行业数据, .item-label.重要主体动态 {
            background: #e3f2fd; color: #1565c0; border-color: #bbdefb;
        }
        /* 黄色系 */
        .item-label.国内一般政策, .item-label.国内政府动向, .item-label.国内政治动态, 
        .item-label.国内一般指导, .item-label.重要国家内政 {
            background: #fff3e0; color: #ef6c00; border-color: #ffe0b2;
        }
        /* 绿色系 */
        .item-label.金融部门事务, .item-label.国际金融政策, .item-label.交易提示, .item-label.机构观点和策略 {
            background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9;
        }
        /* 紫色系 */
        .item-label.国内宏观数据, .item-label.国际宏观数据 {
            background: #ede7f6; color: #4527a0; border-color: #d1c4e9;
        }
        /* 红色系 */
        .item-label.一般国际事务, .item-label.国际一般政策, .item-label.地缘政治动态 {
            background: #fce4ec; color: #c2185b; border-color: #f8bbd0;
        }
        /* 科技 */
        .item-label.科学技术前沿动态 {
            background: #e0f2f1; color: #00695c; border-color: #b2dfdb;
        }
        /* 其它 */
        .item-label.自然事件, .item-label.社会事件, .item-label.新闻集合, .item-label.其它, .item-label.其他, .item-label.未分类 {
            background: #f5f5f5; color: #424242; border-color: #e0e0e0;
        }

        .item-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .item-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .item-content {
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { padding: 1rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
            .header-content { width: 100%; }
            .nav-link { width: 100%; text-align: center; }
            .controls-grid { grid-template-columns: 1fr; gap: 1rem; }
            .feed-container { padding: 1rem; }
            .history-item { padding: 1rem; }
            .item-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div>
                    <h1>历史消息流查询</h1>
                    <p>Historical Message Stream Query</p>
                </div>
            </div>
            <div class="header-right">
                <a href="/" class="nav-link">返回首页</a>
            </div>
        </div>

        <div class="controls-section">
            <div class="controls-title">查询控制</div>
            <div class="controls-grid">
                <div class="control-group">
                    <label class="control-label" for="start-date-picker">开始日期</label>
                    <input type="date" id="start-date-picker" class="date-input" value="{{ selected_date }}">
                </div>
                <div class="control-group">
                    <label class="control-label" for="end-date-picker">结束日期</label>
                    <input type="date" id="end-date-picker" class="date-input" value="{{ selected_date }}">
                </div>
                <div class="control-group">
                    <button id="load-btn" class="load-btn">
                        🔍 加载数据
                    </button>
                </div>
            </div>
            <div class="range-note">可选择同一天查看单日历史，也可选择起止日期一次加载区间内全部消息。</div>
        </div>

        <div class="filters-section">
            <div class="filters-title">分类筛选</div>
            <div class="filter-buttons" id="label-filters"></div>
        </div>

        <div class="feed-container">
            <div class="feed-title">历史消息</div>
            <div id="stats-info" class="stats-info" style="display: none;"></div>
            <div id="feed">
                <div class="empty-state">
                    请选择日期并点击"加载数据"开始查询历史消息
                </div>
            </div>
        </div>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const statsInfo = document.getElementById('stats-info');
        const labelFiltersWrap = document.getElementById('label-filters');
        const startDatePicker = document.getElementById('start-date-picker');
        const endDatePicker = document.getElementById('end-date-picker');
        const loadBtn = document.getElementById('load-btn');

        // 后端传入的数据
        const LABEL_GROUPS = JSON.parse('{{ label_groups|tojson }}');
        let currentFilter = JSON.parse('{{ initial|tojson }}'); 
        let currentDate = "{{ selected_date }}";
        let availableDateList = [];

        // 构建筛选器按钮
        function buildFilters() {
            labelFiltersWrap.innerHTML = '';

            // 1. 全部显示行
            const allRow = document.createElement('div');
            allRow.className = 'filter-row';
            const allBtn = document.createElement('button');
            allBtn.className = `filter-category-label ${currentFilter === '全部' ? 'active' : ''}`;
            allBtn.textContent = '全部显示';
            allBtn.style.width = '100%';
            allBtn.onclick = () => {
                currentFilter = '全部';
                refreshUI();
            };
            allRow.appendChild(allBtn);
            labelFiltersWrap.appendChild(allRow);

            // 2. 遍历分组
            LABEL_GROUPS.forEach(group => {
                const row = document.createElement('div');
                row.className = 'filter-row';

                // 分类标题
                const categoryBtn = document.createElement('button');
                const isGroupSelected = Array.isArray(currentFilter) && 
                                        currentFilter.length === group.tags.length && 
                                        group.tags.every(t => currentFilter.includes(t));
                
                categoryBtn.className = `filter-category-label ${isGroupSelected ? 'active' : ''}`;
                categoryBtn.textContent = group.name;
                categoryBtn.title = `筛选 [${group.name}] 分类下所有消息`;
                categoryBtn.onclick = () => {
                    currentFilter = group.tags; 
                    refreshUI();
                };
                row.appendChild(categoryBtn);

                // 标签按钮
                group.tags.forEach(tag => {
                    const btn = document.createElement('button');
                    let isActive = (currentFilter === tag);
                    
                    btn.className = `filter-btn ${isActive ? 'active' : ''}`;
                    btn.textContent = tag;
                    btn.onclick = () => {
                        currentFilter = tag;
                        refreshUI();
                    };
                    row.appendChild(btn);
                });
                labelFiltersWrap.appendChild(row);
            });
        }

        function refreshUI() {
            buildFilters();
            // 在内存中筛选并重新渲染
            if (allDayData.length > 0) {
                 renderFilteredData(getDateLabel(), allDayData.length);
            } else if (startDatePicker.value || endDatePicker.value) {
                 // 如果还没有数据但有日期（比如改变筛选条件前还没加载过？不，loadData先于筛选），
                 // 这里通常意味着用户刚进页面就点筛选。
                 // 如果有date，尝试触发加载？如果不，就什么都不做
            }
        }

        function getDateLabel() {
            const startDate = startDatePicker.value;
            const endDate = endDatePicker.value;
            if (startDate && endDate && startDate !== endDate) {
                return `${startDate} ~ ${endDate}`;
            }
            return startDate || endDate || '';
        }

        function setDefaultDateRange(dates) {
            if (!Array.isArray(dates) || dates.length === 0) {
                return false;
            }

            availableDateList = dates.slice();
            const latestDate = dates[0];
            const earliestIndex = Math.min(2, dates.length - 1);
            const earliestDate = dates[earliestIndex];

            if (!startDatePicker.value) {
                startDatePicker.value = earliestDate;
            }
            if (!endDatePicker.value) {
                endDatePicker.value = latestDate;
            }

            return true;
        }

        // 加载数据
        let allDayData = []; // 缓存当日全部数据

        function loadData() {
            const startDate = startDatePicker.value;
            const endDate = endDatePicker.value;
            if (!startDate || !endDate) {
                alert('请选择日期');
                return;
            }

            loadBtn.disabled = true;
            loadBtn.textContent = '⏳ 加载中...';
            feed.innerHTML = '<div class="empty-state">正在加载历史数据...</div>';
            statsInfo.style.display = 'none';

            // 策略：始终请求“全部”数据，然后在前端根据 currentFilter 过滤
            const params = new URLSearchParams({
                label: '全部'
            });

            if (startDate === endDate) {
                params.set('date', startDate);
            } else {
                params.set('start_date', startDate);
                params.set('end_date', endDate);
            }

            fetch(`/monitor/history/data?${params}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        feed.innerHTML = `<div class="empty-state">加载失败: ${data.error}</div>`;
                        return;
                    }

                    allDayData = data.items || [];
                    
                    // 前端筛选
                    renderFilteredData(data.date, allDayData.length);
                })
                .catch(err => {
                    console.error('加载数据失败:', err);
                    feed.innerHTML = '<div class="empty-state">加载数据失败，请重试</div>';
                })
                .finally(() => {
                    loadBtn.disabled = false;
                    loadBtn.textContent = '🔍 加载数据';
                });
        }

        function renderFilteredData(dateStr, totalCount) {
             // 根据 currentFilter 过滤 allDayData
             let filtered = [];
             if (currentFilter === '全部') {
                 filtered = allDayData;
             } else if (Array.isArray(currentFilter)) {
                 filtered = allDayData.filter(item => currentFilter.includes(item.primary_label));
             } else {
                 filtered = allDayData.filter(item => item.primary_label === currentFilter);
             }

             // 显示统计信息
             statsInfo.textContent = `显示 ${filtered.length} 条 / 总计 ${totalCount} 条 (日期: ${dateStr})`;
             statsInfo.style.display = 'flex';

             if (filtered.length === 0) {
                 feed.innerHTML = '<div class="empty-state">该分类下暂无相关消息</div>';
             } else {
                 feed.innerHTML = '';
                 filtered.forEach(item => renderItem(item));
             }
        }

        // 渲染单条消息
        function renderItem(item) {
            const el = document.createElement('div');
            el.className = 'history-item';

            const timeStr = item.time_str || new Date(item.ctime * 1000).toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            el.innerHTML = `
                <div class="item-header">
                    <span class="item-label ${item.primary_label || '其它'}">${item.primary_label || '其它'}</span>
                    <span class="item-time">${timeStr}</span>
                </div>
                <div class="item-title">${item.title || ''}</div>
                <div class="item-content">${(item.content || '').replace(/\n/g, '<br>')}</div>
            `;

            feed.appendChild(el);
        }

        // 事件监听
        loadBtn.addEventListener('click', loadData);

        // 回车键快速加载
        [startDatePicker, endDatePicker].forEach((input) => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loadData();
                }
            });
        });

        // 初始化
        buildFilters();

        function loadAvailableDatesAndInit() {
            fetch('/monitor/history/dates')
                .then(r => r.json())
                .then(dates => {
                    if (setDefaultDateRange(dates)) {
                        loadData();
                        return;
                    }

                    if (currentDate) {
                        startDatePicker.value = currentDate;
                        endDatePicker.value = currentDate;
                        loadData();
                    }
                })
                .catch(() => {
                    if (currentDate) {
                        startDatePicker.value = currentDate;
                        endDatePicker.value = currentDate;
                        loadData();
                    }
                });
        }

        // 先用数据库真实存在的日期初始化，再自动加载
        loadAvailableDatesAndInit();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global-theme.css') }}?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息监控 - 神机天象</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}?v=1.2">
    <!-- Synchronous Global Theme Script for preventing flash -->
    <script src="{{ url_for('static', filename='js/theme.js') }}?v=2"></script>
    <style>
        :root {
            /* Dark Theme (Default to match global) */
            --primary-color: #60a5fa;
            --accent-color: #f87171;
            --bg-color: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --bg-input: #334155;
            --radius-md: 8px;
            --radius-lg: 16px;
            --font-serif: 'Georgia', 'Songti SC', 'STSong', serif;
        }

        [data-theme="light"] {
            /* Light Theme Overrides */
            --primary-color: #1B365D; /* Oxford Blue */
            --accent-color: #E63946;  /* Imperial Red */
            --bg-color: #F1F5F9;      /* Slate 100 */
            --bg-card: #ffffff;
            --text-main: #1e293b;     /* Slate 800 */
            --text-secondary: #64748b;/* Slate 500 */
            --border-color: #e2e8f0;  /* Slate 200 */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --bg-input: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            margin: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 24px;
        }

        /* === 标题行 === */
        .page-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }
        .page-title {
            margin: 0;
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.01em;
        }
        .page-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(230, 57, 70, 0.4);
        }

        /* === 搜索行 === */
        .search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .search-row .search-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .search-row input {
            flex: 1;
            font-size: 0.88rem;
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-main);
            outline: none;
            min-width: 0;
        }
        .search-row input:focus { border-color: var(--primary-color); }
        .search-row button {
            font-size: 0.82rem;
            padding: 7px 16px;
            border-radius: 8px;
            border: 1px solid var(--primary-color);
            background: var(--primary-color);
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
        }
        .search-row button.clear-search {
            background: var(--bg-input);
            color: var(--text-secondary);
            border-color: var(--border-color);
            display: none;
        }
        .search-row button.clear-search.visible { display: inline-block; }

        /* === 时段行 === */
        .period-row-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 10px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .period-row-wrap .period-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .period-tab {
            padding: 5px 16px;
            border-radius: 16px;
            font-size: 0.82rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s;
        }
        .period-tab:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .period-tab.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        /* === 筛选行：每行两个二级聚类 === */
        .filter-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            box-shadow: var(--shadow);
            margin-bottom: 14px;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
        }
        .filter-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
        }
        .filter-category-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-category-label:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .filter-category-label.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        .filter-btn {
            padding: 3px 10px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 0.76rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .filter-btn.active { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }

        .feed-container {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            min-height: 400px;
        }

        .ai-summary-container {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .ai-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .ai-content {
            font-size: 0.93rem;
            line-height: 1.7;
            color: var(--text-main);
            overflow-y: auto;
            max-height: calc(100vh - 180px);
            white-space: normal;
        }

        .ai-content h1, .ai-content h2, .ai-content h3 {
            margin: 0.7rem 0 0.4rem;
            line-height: 1.4;
        }
        .ai-content p { margin: 0.5rem 0; }
        .ai-content ul, .ai-content ol { margin: 0.5rem 0 0.5rem 1.2rem; }
        .ai-content code {
            background: rgba(127,127,127,0.16);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            font-family: Menlo, Consolas, monospace;
        }
        .ai-content pre {
            background: rgba(127,127,127,0.16);
            padding: 0.7rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        @media (max-width: 992px) {
            .main-layout { grid-template-columns: 1fr; }
            .ai-summary-container { position: static; order: -1; }
            .filter-grid { grid-template-columns: 1fr; }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .empty-state::before {
            content: '📭';
            font-size: 1.8rem;
            display: block;
            margin-bottom: 8px;
        }

        .telegraph-item {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
            position: relative;
        }
        .telegraph-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .telegraph-item.new-item {
            animation: highlightNew 2s ease-out;
            border-left: 3px solid var(--accent-color);
        }
        @keyframes highlightNew {
            0% { background-color: rgba(192, 57, 43, 0.1); }
            100% { background-color: var(--bg-input); }
        }

        .item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .item-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 9px;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 600;
            background: var(--bg-color);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .item-label.cluster-company { background: #e3f2fd; color: #1565c0; border-color: #bbdefb; }
        .item-label.cluster-policy { background: #fff3e0; color: #ef6c00; border-color: #ffe0b2; }
        .item-label.cluster-trading { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .item-label.cluster-market { background: #edf7ed; color: #1b5e20; border-color: #cfe8cf; }
        .item-label.cluster-industry { background: #e0f2f1; color: #00695c; border-color: #b2dfdb; }
        .item-label.cluster-international-high { background: #fce4ec; color: #c2185b; border-color: #f8bbd0; }
        .item-label.cluster-international { background: #f3e5f5; color: #6a1b9a; border-color: #e1bee7; }
        .item-label.cluster-macro { background: #ede7f6; color: #4527a0; border-color: #d1c4e9; }
        .item-label.cluster-event { background: #fff5f5; color: #b91c1c; border-color: #fecaca; }
        .item-label.cluster-digest { background: #f5f5f5; color: #424242; border-color: #e0e0e0; }
        .item-label.cluster-overview { background: #ede9fe; color: #5b21b6; border-color: #ddd6fe; }

        .item-time {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        .item-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .item-content {
            font-size: 0.92rem;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }

        .status-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status-indicator.connected { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-indicator.disconnected { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .status-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .search-highlight { background: #fbbf24; color: #1e293b; padding: 0 2px; border-radius: 2px; }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .page-title { font-size: 1.4rem; }
            .filter-grid { grid-template-columns: 1fr; }
            .feed-container { padding: 14px; }
            .telegraph-item { padding: 12px 14px; }
            .item-header { flex-direction: column; align-items: flex-start; }
            .status-indicator { bottom: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题行 -->
        <div class="page-title-row">
            <h1 class="page-title">消息监控</h1>
        </div>

        <!-- 搜索行 -->
        <div class="search-row">
            <span class="search-label">🔍 搜索</span>
            <input type="text" id="search-input" placeholder="输入关键字检索标题和内容...">
            <button class="clear-search" id="btn-clear-search" title="清除搜索">✕</button>
            <button id="btn-search">搜索</button>
        </div>

        <!-- 时段行 + 日期 -->
        <div class="period-row-wrap" id="period-row">
            <span class="period-label">⏱ 时段</span>
            <span class="period-tab active" data-period="all">全部</span>
            <span class="period-tab" data-period="morning">Morning</span>
            <span class="period-tab" data-period="noon">Noon</span>
            <span class="period-tab" data-period="afternoon">Afternoon</span>
            <span class="period-tab" data-period="overnight">Overnight</span>
            <span style="flex:1;"></span>
            <input type="date" id="date-picker" style="font-size:0.82rem;padding:5px 10px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-main);width:140px;" title="选择日期查看历史">
            <button id="btn-latest" style="font-size:0.82rem;padding:5px 16px;border-radius:6px;border:1px solid var(--primary-color);background:var(--primary-color);color:#fff;cursor:pointer;font-weight:500;">最新</button>
        </div>

        <!-- 筛选行：两列网格 -->
        <div class="filter-section">
            <div class="filter-grid" id="label-filters"></div>
        </div>

        <div class="main-layout">
            <div class="feed-container">
                <div id="feed" data-labelgroups='{{ label_groups|tojson }}' data-initial='{{ initial|tojson }}'></div>
            </div>
            
            <div class="ai-summary-container">
                <div class="ai-title">
                    <span> AI 洞察</span>
                    <span id="ai-period-badge" style="background: var(--accent-color); color:#fff; font-size:0.68rem; padding:1px 6px; border-radius:8px; margin-left:6px; font-weight:normal;">—</span>
                </div>
                <div id="ai-content" class="ai-content">
                    <div class="empty-state">选择具体时段或分类后查看 AI 研报</div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-indicator disconnected" id="status-indicator">加载中...</div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script>
        const feed = document.getElementById('feed');
        const labelFiltersWrap = document.getElementById('label-filters');
        const statusIndicator = document.getElementById('status-indicator');
        
        const LABEL_GROUPS = JSON.parse(feed.dataset.labelgroups);
        let currentFilter = JSON.parse(feed.dataset.initial); 
        const allItems = [];
        const itemIdSet = new Set();
        const MAX_ITEMS = 1500;
        const MAX_RENDER_ITEMS = 300;
        const LABEL_STYLE_MAP = {
            '交易提示': 'cluster-trading', '公司公告': 'cluster-company',
            '机构观点和策略': 'cluster-market', '金融部门事务': 'cluster-market',
            '行业消息': 'cluster-industry', '行业数据': 'cluster-industry',
            '重要主体动态': 'cluster-industry', '科学技术前沿动态': 'cluster-industry',
            '国内政治动态': 'cluster-policy', '国内一般指导': 'cluster-policy',
            '国内一般政策': 'cluster-policy', '国内政府动向': 'cluster-policy',
            '地缘政治动态': 'cluster-international-high', '国际金融政策': 'cluster-international-high',
            '一般国际事务': 'cluster-international', '国际一般政策': 'cluster-international',
            '重要国家内政': 'cluster-international',
            '国内宏观数据': 'cluster-macro', '国际宏观数据': 'cluster-macro',
            '自然事件': 'cluster-event', '社会事件': 'cluster-event',
            '新闻集合': 'cluster-digest', '综合': 'cluster-overview'
        };
        function getLabelClass(label) { return LABEL_STYLE_MAP[label] || 'cluster-digest'; }

        const datePicker = document.getElementById('date-picker');
        const btnLatest = document.getElementById('btn-latest');
        const searchInput = document.getElementById('search-input');
        const btnSearch = document.getElementById('btn-search');
        const btnClearSearch = document.getElementById('btn-clear-search');
        let currentViewDate = '';  // 空=最新/实时模式
        let currentSearch = '';
        let latestDbDate = '';  // 数据库中最新的日期

        const todayStr = new Date().toISOString().slice(0, 10);

        // 先获取数据库最新日期，再初始化
        function getLatestDbDate() {
            return fetch('/monitor/telegraph/latest_date')
                .then(res => res.json())
                .then(data => {
                    latestDbDate = data.date || todayStr;
                    return latestDbDate;
                })
                .catch(() => {
                    latestDbDate = todayStr;
                    return latestDbDate;
                });
        }

        function loadRealtimeData() {
            const selectedDate = currentViewDate || '';
            let initUrl = '/monitor/telegraph/init';
            const params = [];
            if (selectedDate) params.push(`date=${encodeURIComponent(selectedDate)}`);
            if (currentTimeFilter && currentTimeFilter !== 'all') params.push(`period=${encodeURIComponent(currentTimeFilter)}`);
            if (currentSearch) params.push(`search=${encodeURIComponent(currentSearch)}`);
            if (params.length) initUrl += '?' + params.join('&');

            fetch(initUrl)
                .then(res => res.json())
                .then(data => {
                    allItems.length = 0;
                    itemIdSet.clear();
                    data.forEach(item => handleIncoming(item, true));
                    rerenderFiltersAndItems();
                    
                    if (!currentViewDate && !window.evtSource) {
                        window.evtSource = new EventSource('/monitor/telegraph/stream');
                        window.evtSource.onmessage = function(e) {
                             const item = JSON.parse(e.data);
                             handleIncoming(item, false);
                        };
                        window.evtSource.onerror = function() {
                            statusIndicator.className = 'status-indicator disconnected';
                            statusIndicator.textContent = '连接中断';
                        };
                        window.evtSource.onopen = function() {
                            statusIndicator.className = 'status-indicator connected';
                            statusIndicator.textContent = '实时连接';
                        };
                    }
                    if (currentViewDate && window.evtSource) {
                        window.evtSource.close();
                        window.evtSource = null;
                        statusIndicator.className = 'status-indicator disconnected';
                        statusIndicator.textContent = '历史模式';
                    }
                })
                .catch(err => {
                    console.error("Init failed", err);
                    feed.innerHTML = '<div class="empty-state">无法加载数据</div>';
                });
        }

        // 日期选择器变化
        datePicker.addEventListener('change', () => {
            currentViewDate = datePicker.value;
            currentAiCluster = '综合';
            currentFilter = '全部';
            feed.innerHTML = '<div class="empty-state">正在加载...</div>';
            loadRealtimeData();
            if (currentTimeFilter !== 'all') {
                fetchAiReport(currentTimeFilter);
            } else {
                aiContent.innerHTML = '<div class="empty-state">选择具体时段或分类后查看 AI 研报</div>';
                aiPeriodBadge.textContent = '—';
            }
        });

        // "最新"按钮 - 回到实时模式
        btnLatest.addEventListener('click', () => {
            currentViewDate = '';
            datePicker.value = latestDbDate || todayStr;
            currentAiCluster = '综合';
            currentFilter = '全部';
            feed.innerHTML = '<div class="empty-state">正在加载最新数据...</div>';
            loadRealtimeData();
            if (currentTimeFilter !== 'all') {
                fetchAiReport(currentTimeFilter);
            } else {
                aiContent.innerHTML = '<div class="empty-state">选择具体时段或分类后查看 AI 研报</div>';
                aiPeriodBadge.textContent = '—';
            }
        });

        // 搜索
        function doSearch() {
            currentSearch = searchInput.value.trim();
            if (currentSearch) {
                btnClearSearch.classList.add('visible');
            } else {
                btnClearSearch.classList.remove('visible');
            }
            feed.innerHTML = '<div class="empty-state">正在搜索...</div>';
            loadRealtimeData();
            // 搜索不影响 AI 研报
        }
        btnSearch.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });
        btnClearSearch.addEventListener('click', () => {
            searchInput.value = '';
            currentSearch = '';
            btnClearSearch.classList.remove('visible');
            feed.innerHTML = '<div class="empty-state">正在加载...</div>';
            loadRealtimeData();
        });

        function clearFilters(){
            while(labelFiltersWrap.firstChild) labelFiltersWrap.removeChild(labelFiltersWrap.firstChild);
        }

        function buildFilters(){
           function applyFilterAndReport(newFilter, newCluster) {
               currentFilter = newFilter;
               currentAiCluster = newCluster;
               rerenderFiltersAndItems();
               if (currentTimeFilter !== 'all') {
                   fetchAiReport(currentTimeFilter);
               }
           }

           // 全部显示
           const allBtn = document.createElement('button');
           allBtn.className = `filter-category-label ${currentFilter === '全部' ? 'active' : ''}`;
           allBtn.textContent = '全部';
           allBtn.onclick = () => applyFilterAndReport('全部', '综合');
           labelFiltersWrap.appendChild(allBtn);

           LABEL_GROUPS.forEach(group => {
               const groupWrap = document.createElement('div');
               groupWrap.className = 'filter-group';

               const catBtn = document.createElement('button');
               const isGroupSelected = Array.isArray(currentFilter) && 
                                       currentFilter.length === group.tags.length && 
                                       group.tags.every(t => currentFilter.includes(t));
               catBtn.className = `filter-category-label ${isGroupSelected ? 'active' : ''}`;
               catBtn.textContent = group.name;
               catBtn.title = "筛选此分类全部";
               catBtn.onclick = () => applyFilterAndReport(group.tags, group.name);
               groupWrap.appendChild(catBtn);

               group.tags.forEach(tag => {
                   const btn = document.createElement('button');
                   btn.className = `filter-btn ${currentFilter === tag ? 'active' : ''}`;
                   btn.textContent = tag;
                   btn.onclick = () => applyFilterAndReport(tag, group.name);
                   groupWrap.appendChild(btn);
               });

               labelFiltersWrap.appendChild(groupWrap);
           });
        }
        
        function rerenderFiltersAndItems() {
            clearFilters();
            buildFilters();
            rerender();
        }

        const aiContent = document.getElementById('ai-content');
        const aiPeriodBadge = document.getElementById('ai-period-badge');
        const periodRow = document.getElementById('period-row');
        let currentTimeFilter = 'all';
        let currentAiCluster = '综合';

        function renderMarkdown(mdText) {
            const text = mdText || '';
            if (window.marked && window.DOMPurify) {
                const html = window.marked.parse(text, { breaks: true, gfm: true });
                return window.DOMPurify.sanitize(html);
            }
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        }

        function fetchAiReport(period = '') {
            aiContent.innerHTML = '<div class="empty-state">正在加载 AI 分析报告...</div>';
            let url = '/monitor/telegraph/report';
            const params = [];
            if (period && period !== 'all') params.push(`period=${encodeURIComponent(period)}`);
            const reportDate = currentViewDate || latestDbDate || todayStr;
            params.push(`date=${encodeURIComponent(reportDate)}`);
            params.push(`cluster=${encodeURIComponent(currentAiCluster)}`);
            if (params.length) url += '?' + params.join('&');
            
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.ok) {
                        aiContent.innerHTML = renderMarkdown(data.report);
                        aiPeriodBadge.textContent = data.cluster || data.period.toUpperCase();
                    } else {
                        aiContent.innerHTML = `<div class="empty-state">${data.msg || '暂无该时段报告'}</div>`;
                        aiPeriodBadge.textContent = 'NONE';
                    }
                })
                .catch(err => {
                    aiContent.innerHTML = '<div class="empty-state">加载失败</div>';
                });
        }

        // 时段切换
        periodRow.addEventListener('click', (e) => {
            const tab = e.target.closest('.period-tab');
            if (!tab) return;
            periodRow.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTimeFilter = tab.dataset.period;
            rerender();
            if (currentTimeFilter === 'all') {
                aiContent.innerHTML = '<div class="empty-state">选择具体时段或分类后查看 AI 研报</div>';
                aiPeriodBadge.textContent = '—';
            } else {
                fetchAiReport(currentTimeFilter);
            }
        });

        function isItemInPeriod(item, period) {
            if (period === 'all') return true;
            const date = new Date(item.ctime * 1000);
            const timeVal = date.getHours() * 100 + date.getMinutes();
            if (period === 'morning') return timeVal >= 930 && timeVal < 1130;
            if (period === 'noon') return timeVal >= 1130 && timeVal < 1300;
            if (period === 'afternoon') return timeVal >= 1300 && timeVal < 1500;
            if (period === 'overnight') return timeVal >= 1500 || timeVal < 930;
            return true;
        }

        function highlightSearch(text) {
            if (!currentSearch || !text) return text;
            const escaped = currentSearch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            return text.replace(regex, '<span class="search-highlight">$1</span>');
        }

        function renderItem(item, appendToBottom=false, isNew=false){
            if(item.type === 'heartbeat') return;
            if (!isItemInPeriod(item, currentTimeFilter)) return;

            let isVisible = false;
            if (currentFilter === '全部') {
                isVisible = true;
            } else if (Array.isArray(currentFilter)) {
                if (currentFilter.includes(item.primary_label) || currentFilter.includes(item.cluster_label)) isVisible = true;
            } else {
                if (item.primary_label === currentFilter || item.cluster_label === currentFilter) isVisible = true;
            }
            if (!isVisible) return false;

            const el = document.createElement('div');
            el.className = `telegraph-item ${isNew ? 'new-item' : ''}`;

            const ts = item.ctime ? new Date(item.ctime * 1000).toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            }) : '';

            const titleHtml = highlightSearch((item.title || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'));
            const contentHtml = highlightSearch((item.content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>'));

            el.innerHTML = `
                <div class="item-header">
                    <span class="item-label ${item.cluster_class || getLabelClass(item.primary_label)}">${item.primary_label || ''}</span>
                    <span class="item-time">${ts}</span>
                </div>
                <div class="item-title">${titleHtml}</div>
                <div class="item-content mobile-fold-text" onclick="this.classList.toggle('expanded')">${contentHtml}</div>
            `;

            if(appendToBottom){ feed.appendChild(el); }
            else { feed.insertBefore(el, feed.firstChild); }
            return true;
        }

        function handleIncoming(item, isInit=false){
            if(!item || item.type === 'heartbeat' || item.ping) return;
            if(item.id === undefined || item.id === null) return;
            if(itemIdSet.has(item.id)) return;
            itemIdSet.add(item.id);

            if(isInit){
                allItems.push(item);
            } else {
                allItems.unshift(item);
                renderItem(item, false, true);
            }
            if (allItems.length > MAX_ITEMS) {
                const overflow = allItems.splice(MAX_ITEMS);
                overflow.forEach(x => itemIdSet.delete(x.id));
            }
        }
        
        function rerender(){
             feed.innerHTML = '';
             let visibleCount = 0;
             allItems.forEach(item => {
                 if (visibleCount >= MAX_RENDER_ITEMS) return;
                 if (isItemInPeriod(item, currentTimeFilter)) {
                     const rendered = renderItem(item, true);
                     if (rendered) visibleCount++;
                 }
             });
             if (visibleCount === 0) {
                 feed.innerHTML = '<div class="empty-state">' + (currentSearch ? '未找到匹配消息' : '当前时段无相关消息') + '</div>';
             }
        }

        // 启动：先获取最新日期，自动加载当天全部数据
        getLatestDbDate().then(() => {
            currentViewDate = latestDbDate || todayStr;
            datePicker.value = currentViewDate;
            loadRealtimeData();
        });
        aiContent.innerHTML = '<div class="empty-state">选择具体时段或分类后查看 AI 研报</div>';
        aiPeriodBadge.textContent = '—';
    </script>
</body>
</html>
